name: Daily Swing Recommendations

on:
  schedule:
    # 매일 오전 3시 40분 KST (전일 UTC 18:40)
    - cron: '40 18 * * *'
  workflow_dispatch:

concurrency:
  group: daily-swing-recommendations
  cancel-in-progress: false

jobs:
  swing-recommendations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # corepack을 setup-node보다 먼저 켜야 pnpm 캐시가 동작합니다.
      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # pykrx MCP는 uvx로 실행되므로 uv가 필요합니다 (한국 OHLCV 실데이터).
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run swing backtest, tuning, and recommendation pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOW_LOCAL_STORE_FALLBACK: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER_ORDER: ${{ vars.LLM_PROVIDER_ORDER }}
          BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
          BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_WEB_URL: ${{ secrets.KAKAO_WEB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMANDER_CHAT_ID: ${{ secrets.COMMANDER_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SWING_BACKTEST_FORCE: "true"
          # 진화 탐색은 주 1회(EVOLUTION_DAY, 기본 월요일 KST)만 실행하고,
          # 다른 날은 승격된 챔피언을 일일 추천에 적용만 한다(저렴).
          EVOLUTION_AUTO_PROMOTE: ${{ vars.EVOLUTION_AUTO_PROMOTE }}
          EVOLUTION_DAY: ${{ vars.EVOLUTION_DAY }}
          EVOLUTION_POPULATION: "6"
          EVOLUTION_GENERATIONS: "2"
        run: |
          corepack pnpm check
          corepack pnpm start:swing:backtest
          corepack pnpm start:swing:tune
          corepack pnpm start:swing:evolve || echo "evolve 건너뜀 (백테스트 데이터 부족 등)"
          corepack pnpm start:swing

      # 진화 에이전트가 챔피언을 승격했으면 추적 파일을 저장소에 커밋백해
      # 다음 런이 이어받게 한다(세대 누적). [skip ci]로 재귀 트리거 방지.
      - name: Persist evolved champion
        if: always()
        continue-on-error: true
        run: |
          git add data/evolution/champion.json 2>/dev/null || true
          if git diff --cached --quiet -- data/evolution/champion.json; then
            echo "champion 변동 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(evolution): 챔피언 게놈 갱신 [skip ci]"
            git push
          fi

      - name: Notify completion
        if: always()
        run: |
          echo "Daily swing recommendations completed at $(date '+%Y-%m-%d %H:%M:%S %Z')"
