name: Daily Market Monitor

on:
  schedule:
    # 매일 오전 4시 20분 KST (전일 UTC 19:20)
    - cron: '20 19 * * *'
  workflow_dispatch:

concurrency:
  group: daily-market-monitor
  cancel-in-progress: false

jobs:
  market-monitor:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build standalone monitoring job
        run: corepack pnpm build

      - name: Run watchlist monitoring job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOW_LOCAL_STORE_FALLBACK: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER_ORDER: ${{ vars.LLM_PROVIDER_ORDER }}
          BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
          BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_WEB_URL: ${{ secrets.KAKAO_WEB_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMANDER_CHAT_ID: ${{ secrets.COMMANDER_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: corepack pnpm start:monitor

      - name: Notify completion
        if: always()
        run: |
          echo "Daily market monitor completed at $(date '+%Y-%m-%d %H:%M:%S %Z')"
