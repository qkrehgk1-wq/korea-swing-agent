name: Weekly Alpha Research & Self-Improvement

on:
  schedule:
    # 매주 일요일 오전 6시 KST (토요일 UTC 21:00)
    - cron: '0 21 * * 6'
  workflow_dispatch:

concurrency:
  group: weekly-alpha-research
  cancel-in-progress: false

jobs:
  alpha-research:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run alpha research + continuous improvement
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOW_LOCAL_STORE_FALLBACK: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          BUILT_IN_FORGE_API_KEY: ${{ secrets.BUILT_IN_FORGE_API_KEY }}
          BUILT_IN_FORGE_API_URL: ${{ secrets.BUILT_IN_FORGE_API_URL }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMANDER_CHAT_ID: ${{ secrets.COMMANDER_CHAT_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          # 알파 리서치는 핵심 산출물 — 실패 시 워크플로 실패.
          corepack pnpm start:swing:alpha
          # 자기개선 루프는 선행 상태(유지보수 리포트)가 필요 — best-effort.
          corepack pnpm start:swing:maintain || echo "maintain 건너뜀 (상태/데이터 부족)"
          corepack pnpm start:swing:improve || echo "improve 건너뜀 (유지보수 리포트 없음)"

      - name: Notify completion
        if: always()
        run: |
          echo "Weekly alpha research completed at $(date '+%Y-%m-%d %H:%M:%S %Z')"
